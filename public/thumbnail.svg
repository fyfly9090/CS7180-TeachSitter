<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="TeachSitter — preschool teachers babysitting during school breaks">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcf9f4"/>
      <stop offset="100%" stop-color="#f0ede9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5e77a1"/>
      <stop offset="100%" stop-color="#fd844c"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Decorative background blobs -->
  <circle cx="1080" cy="120" r="140" fill="#aec7f7" opacity="0.35" filter="url(#soft)"/>
  <circle cx="1180" cy="520" r="180" fill="#ffb596" opacity="0.35" filter="url(#soft)"/>
  <circle cx="100" cy="560" r="120" fill="#d9e8c6" opacity="0.5" filter="url(#soft)"/>

  <!-- Logo mark -->
  <g transform="translate(80,100)">
    <rect x="0" y="0" width="72" height="72" rx="18" fill="#5e77a1"/>
    <path d="M18 44 L36 24 L54 44 L54 56 L18 56 Z" fill="#fcf9f4"/>
    <rect x="30" y="44" width="12" height="12" fill="#fd844c"/>
  </g>
  <text x="172" y="152" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="700" fill="#31302d">TeachSitter</text>

  <!-- Headline -->
  <text x="80" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#31302d">Familiar faces,</text>
  <text x="80" y="360" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#a14009">trusted care.</text>

  <!-- Tagline -->
  <text x="80" y="420" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="26" fill="#414750">Connecting preschool parents with their own</text>
  <text x="80" y="456" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="26" fill="#414750">school's teachers for break-time babysitting.</text>

  <!-- Feature chips -->
  <g font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" font-weight="600">
    <g transform="translate(80,520)">
      <rect width="170" height="48" rx="24" fill="#5e77a1"/>
      <text x="85" y="31" fill="#ffffff" text-anchor="middle">AI Matching</text>
    </g>
    <g transform="translate(266,520)">
      <rect width="200" height="48" rx="24" fill="#546147"/>
      <text x="100" y="31" fill="#ffffff" text-anchor="middle">Same Classroom</text>
    </g>
    <g transform="translate(482,520)">
      <rect width="210" height="48" rx="24" fill="#a14009"/>
      <text x="105" y="31" fill="#ffffff" text-anchor="middle">Break-time Care</text>
    </g>
  </g>

  <!-- Right-side illustration: three avatars linked -->
  <g transform="translate(820,220)">
    <!-- connector -->
    <path d="M80 100 Q200 40 320 100" stroke="url(#accent)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M80 100 Q200 160 320 100" stroke="url(#accent)" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.6"/>

    <!-- teacher avatar -->
    <g transform="translate(20,40)">
      <circle cx="60" cy="60" r="60" fill="#5e77a1"/>
      <circle cx="60" cy="48" r="22" fill="#fcf9f4"/>
      <path d="M20 100 Q60 74 100 100 L100 120 L20 120 Z" fill="#fcf9f4"/>
      <text x="60" y="150" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#31302d" text-anchor="middle">Teacher</text>
    </g>

    <!-- child avatar (center, smaller) -->
    <g transform="translate(170,60)">
      <circle cx="40" cy="40" r="40" fill="#fd844c"/>
      <circle cx="40" cy="32" r="15" fill="#fcf9f4"/>
      <path d="M15 64 Q40 48 65 64 L65 80 L15 80 Z" fill="#fcf9f4"/>
      <text x="40" y="110" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#31302d" text-anchor="middle">Child</text>
    </g>

    <!-- parent avatar -->
    <g transform="translate(280,40)">
      <circle cx="60" cy="60" r="60" fill="#546147"/>
      <circle cx="60" cy="48" r="22" fill="#fcf9f4"/>
      <path d="M20 100 Q60 74 100 100 L100 120 L20 120 Z" fill="#fcf9f4"/>
      <text x="60" y="150" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#31302d" text-anchor="middle">Parent</text>
    </g>
  </g>

  <!-- bottom-right tech label -->
  <text x="1200" y="610" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" fill="#414750" text-anchor="end">Next.js · Supabase · Gemini + Claude</text>
</svg>
